let index = 0;

let running = false;
let animationFrame = null;
let hideControlsTimeout;

let phase = 0;
let lastUpdate = 0;


// Rainbow colors
const numberColors = [
    "red",
    "orange",
    "yellow",
    "green",
    "blue",
    "indigo",
    "purple"
    
   	
];

let colorIndex = 0;




function showNumbers() {

    const numberElement =
        document.getElementById("numbers");

    numberElement.innerText =
        numbers[index];

   
if (running) {

    numberElement.style.color =
        numberColors[colorIndex];

    if (currentDirection > 0) {

        // Forward
        colorIndex =
            (colorIndex + 1) %
            numberColors.length;

    } else {

        // Backward
        colorIndex =
            (colorIndex - 1 + numberColors.length) %
            numberColors.length;
    }
}

else {

        numberElement.style.color =
             "white";
    }
}

function sinusoidalLoop(timestamp) {

    if (!running) return;

   // phase += 0.001;

const cycleDuration = 124.1212121; // seconds for full wave cycle
phase += (1.939393939 * Math.PI) / (cycleDuration * 60);

    const wave = Math.sin(phase);

  
currentDirection =
    wave >= 0 ? 1 : -1;

const direction =
    currentDirection;


    const speed =
        Math.abs(wave);

    // Slow at zero crossing
    // Fast at wave peak

 const minInterval = 121.21212121; //528
const maxInterval = 1939.39393939; //528
 // const minInterval = 127.71392081; //7.83
//const maxInterval = 2043.42273307; //7.83
//const minInterval = 132.25463149; //528 432 7.83
//const maxInterval = 1058.03705196; //528 432 7.83

const interval =
    maxInterval -
    speed * (maxInterval - minInterval);

    if (timestamp - lastUpdate > interval) {

        index =
            (index +
             direction +
             numbers.length) %
            numbers.length;

        showNumbers();

        lastUpdate =
            timestamp;
    }

    animationFrame =
        requestAnimationFrame(
            sinusoidalLoop
        );
}

function toggleAutomatic() {

    const btn =
        document.getElementById(
            "timerBtn"
        );

    if (running) {

        running = false;

        cancelAnimationFrame(
            animationFrame
        );

        btn.classList.remove(
            "active"
        );

        btn.innerText =
            "🔄 Automatique";

        document.getElementById(
            "numbers"
        ).style.color = "purple";

    } else {

        colorIndex = 0;

        running = true;

        btn.classList.add(
            "active"
        );

        btn.innerText =
            "⏸️ En cours";

        lastUpdate =
            performance.now();

        animationFrame =
            requestAnimationFrame(
                sinusoidalLoop
            );
    }
}

function showControlsTemporarily() {

    const controls =
        document.getElementById(
            "controls"
        );

    controls.classList.remove(
        "hidden"
    );

    clearTimeout(
        hideControlsTimeout
    );

    hideControlsTimeout =
        setTimeout(() => {

            controls.classList.add(
                "hidden"
            );

        }, 5000);
}

// Fullscreen on first touch/click

function enterFullscreen() {

    if (!document.fullscreenElement) {

        document.documentElement
            .requestFullscreen()
            .catch(err => {
                console.log(err);
            });
    }
}

document.addEventListener(
    "click",
    enterFullscreen,
    { once: true }
);

document.addEventListener(
    "touchstart",
    enterFullscreen,
    { once: true }
);

// Show controls on touch

document.addEventListener(
    "click",
    showControlsTemporarily
);

document.addEventListener(
    "touchstart",
    showControlsTemporarily
);

showNumbers();
